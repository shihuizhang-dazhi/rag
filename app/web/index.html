<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecKB · 企业网络安全助手</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div id="app">
    <template v-if="showLogin">
      <div class="modal-overlay" @click.self="showLogin = false">
        <div class="modal-card login-modal">
          <div class="login-logo">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 2L4 8v10c0 6.6 5.3 11.5 12 12 6.7-.5 12-5.4 12-12V8L16 2z"></path>
              <path d="M11 13h10"></path>
              <path d="M11 17h8"></path>
              <path d="M11 21h6"></path>
            </svg>
          </div>
          <h1>SecKB · 企业网络安全助手</h1>
          <p class="login-sub">登录后可保存对话历史</p>
          <form class="login-form" @submit.prevent="doLogin">
            <input type="text" v-model="loginForm.username" placeholder="用户名" autocomplete="username" :disabled="loginForm.loading" />
            <input type="password" v-model="loginForm.password" placeholder="密码" autocomplete="current-password" :disabled="loginForm.loading" />
            <div v-if="loginForm.error" class="login-error">{{ loginForm.error }}</div>
            <button type="submit" class="btn btn-primary login-btn" :disabled="loginForm.loading">
              {{ loginForm.loading ? '登录中…' : '登 录' }}
            </button>
          </form>
          <hr style="border:none;border-top:1px solid var(--bd);margin:14px 0" />
          <button class="btn btn-ghost" style="width:100%;margin-top:8px" @click="showLogin = false">暂不登录，继续体验</button>
        </div>
      </div>
    </template>

    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 2L4 8v10c0 6.6 5.3 11.5 12 12 6.7-.5 12-5.4 12-12V8L16 2z"></path>
              <path d="M11 13h10"></path>
              <path d="M11 17h8"></path>
              <path d="M11 21h6"></path>
            </svg>
          </div>
          <div class="name">SEC · KB</div>
        </div>

        <nav class="nav">
          <div class="nav-item" :class="{ active: view === 'chat' }" @click="view = 'chat'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            对话查询
          </div>
          <div v-if="isAdmin" class="nav-item" :class="{ active: view === 'docs' }" @click="view = 'docs'; loadDocuments()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            文档管理
          </div>
          <div v-if="isAdmin" class="nav-item" :class="{ active: view === 'users' }" @click="view = 'users'; loadUsers()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            用户管理
          </div>
          <div v-if="isAdmin || isAuditor" class="nav-item" :class="{ active: view === 'audit' }" @click="view = 'audit'; loadAuditLogs()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            审计日志
          </div>
        </nav>

        <template v-if="currentUser">
          <div class="conv-section">
            <div class="conv-header">
              <span>对话列表</span>
              <button class="icon-btn conv-add-btn" @click="newConversation" title="新建对话">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>
            </div>
            <div class="conv-list">
              <div v-for="c in conversations" :key="c.thread_id"
                   class="conv-item"
                   :class="{ active: c.thread_id === threadId }"
                   @click="selectConversation(c.thread_id)">
                <template v-if="editingConvId === c.thread_id">
                  <input class="conv-edit-input"
                         v-model="editingConvTitle"
                         @keydown.enter="saveRename(c.thread_id)"
                         @keydown.escape="cancelRename"
                         @blur="saveRename(c.thread_id)" />
                </template>
                <span v-else class="conv-title" @dblclick.stop="startRename(c.thread_id, c.title)">{{ c.title }}</span>
                <button class="conv-del" @click.stop="deleteConversation(c.thread_id)" title="删除对话">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
              <div v-if="!conversations.length" class="conv-empty">暂无对话，点击 + 新建</div>
            </div>
          </div>
        </template>

        <div class="sidebar-footer">
          <template v-if="currentUser">
            <div class="user-box">
              <div class="user-avatar">{{ (currentUser.username || '?').slice(0, 1).toUpperCase() }}</div>
              <div class="user-meta">
                <div class="user-name">{{ currentUser.username }}</div>
                <div class="user-role">{{ roleLabel(currentUser.role) }}</div>
              </div>
              <button class="icon-btn" title="退出登录" @click="doLogout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
              </button>
            </div>
          </template>
          <template v-else>
            <button class="btn btn-primary" style="width:100%" @click="showLogin = true">登录</button>
          </template>
          <button class="theme-toggle" @click="toggleTheme">
            <svg v-if="!dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.2" y1="4.2" x2="5.6" y2="5.6"></line><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.2" y1="19.8" x2="5.6" y2="18.4"></line><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"></line>
            </svg>
            <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            切换主题
          </button>
        </div>
      </aside>

      <main class="main">
        <!-- 对话页 -->
        <template v-if="view === 'chat'">
          <div class="page-header page-header-chat">
            <div>
              <span class="eyebrow">SecKB Assistant</span>
              <h1>安全问答</h1>
              <p>面向企业网络安全知识检索与问答的 RAG 助手</p>
            </div>
            <button class="btn btn-ghost" @click="clearHistory">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
              清空会话
            </button>
          </div>

          <div class="chat-view">
            <div class="messages-panel">
              <div class="messages" ref="messages">
                <div v-for="(m, i) in messages" :key="i" class="msg" :class="m.role">
                  <div class="icon">
                    <svg v-if="m.role === 'bot'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  </div>
                  <div class="msg-body">
                    <div v-if="m.role === 'bot'" class="bubble md">
                      <div v-if="m.streaming && !m.content" class="thinking-spin">
                        <div class="spinner"><span></span><span></span><span></span></div>
                      </div>
                      <span v-html="renderMd(m.content)"></span>
                      <div class="sources" v-if="m.sources && m.sources.length">
                        <span class="sources-label">参考：</span>
                        <span class="source-chip" v-for="(s, si) in m.sources" :key="si" :title="'相关度 ' + (s.score * 100).toFixed(1) + '%'">{{ s.source || '未知文档' }}</span>
                      </div>
                    </div>
                    <div v-else class="bubble">{{ m.content }}</div>
                  </div>
                </div>
              </div>

              <div class="composer-shell">
                <div class="composer">
                  <div class="composer-inner">
                    <textarea ref="input" v-model="draft" @input="autoGrow" @keydown="onKeydown" placeholder="输入安全问题，Enter 发送 · Shift+Enter 换行" rows="1"></textarea>
                    <button v-if="isStreaming" class="stop-btn stop-btn-large" @click="stopStreaming">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                      </svg>
                      停止生成
                    </button>
                    <button v-else class="send-btn send-btn-large" :disabled="!draft.trim()" @click="send">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                      </svg>
                      发送
                    </button>
                  </div>
                  <div class="composer-footer">
                    <span class="composer-hint">Enter 发送 · Shift+Enter 换行</span>
                    <span class="composer-state" :class="{ live: isStreaming }">{{ isStreaming ? '生成中…' : '就绪' }}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- 文档管理 -->
        <template v-else-if="view === 'docs'">
          <div class="page-header">
            <div>
              <span class="eyebrow">Knowledge Base</span>
              <h1>文档管理</h1>
              <p>上传文档、自动向量化，并在知识库中统一检索</p>
            </div>
            <button class="btn btn-primary" @click="triggerUpload">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
              上传文档
            </button>
          </div>

          <div class="doc-view">
            <div class="dropzone" :class="{ drag: dragging }" @click="triggerUpload" @dragover.prevent="dragging = true" @dragleave.prevent="dragging = false" @drop.prevent="onDrop">
              <div class="plus">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </div>
              <div class="t1">拖拽文件到此处或点击上传</div>
              <div class="t2">支持 .txt, .pdf, .csv, .md 格式，单个文件不超过 50MB</div>
              <input ref="file" type="file" multiple accept=".txt,.pdf,.csv,.md" style="display:none" @change="onPick" />
            </div>

            <div class="upload-list" v-if="uploadingFiles.length">
              <div class="upload-item" v-for="(f, i) in uploadingFiles" :key="i">
                <div class="upload-row">
                  <div class="upload-left">
                    <div class="upload-meta">
                      <div class="upload-name">{{ f.name }}</div>
                      <div class="upload-size">{{ f.size }}</div>
                    </div>
                  </div>
                  <span class="upload-status">{{ f.phase === 'vectorizing' ? '正在向量化中' : '上传中 ' + f.percent + '%' }}</span>
                </div>
                <div class="progress">
                  <div class="progress-bar" :class="{ indet: f.phase === 'vectorizing' }" :style="f.phase === 'vectorizing' ? {} : { width: f.percent + '%' }"></div>
                </div>
              </div>
            </div>

            <div class="section-bar">
              <h2>已向量化文档</h2>
              <div class="right">
                <div class="search">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                  </svg>
                  <input :value="docSearchInput" @input="onDocSearchInput" placeholder="搜索文档名称..." />
                </div>
                <span class="count">{{ total }} 个文档</span>
              </div>
            </div>

            <div class="doc-table">
              <table v-if="docs.length">
                <thead><tr><th style="width:40%">文档名称</th><th>大小</th><th>上传时间</th><th>状态</th><th style="width:110px">操作</th></tr></thead>
                <tbody>
                  <tr v-for="doc in docs" :key="doc.id">
                    <td><div class="file-cell"><div class="fi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></div>{{ doc.name }}</div></td>
                    <td>{{ doc.size }}</td><td>{{ doc.time }}</td>
                    <td><span class="tag ok"><span class="d"></span>已向量化</span></td>
                    <td class="action-cell">
                      <span class="row-action" @click="previewDoc(doc.id)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>预览</span>
                      <span class="row-action" @click="downloadDoc(doc.id)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>下载</span>
                      <span class="row-action danger del-icon" @click="removeDoc(doc.id)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>删除</span>
                    </td>
                  </tr>
                </tbody>
              </table>
              <div v-else class="empty"><div class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></div><p>暂无文档，上传后将自动向量化存储</p></div>
            </div>

            <div class="pagination">
              <span>显示 {{ rangeStart }}-{{ rangeEnd }} 条，共 {{ total }} 条</span>
              <div class="pager">
                <button class="pager-btn" @click="prevPage" :disabled="page <= 1">上一页</button>
                <span class="pager-info">{{ page }} / {{ totalPages || 1 }}</span>
                <button class="pager-btn" @click="nextPage" :disabled="page >= totalPages">下一页</button>
              </div>
              <label>每页显示
                <select v-model.number="pageSize" @change="onPageSizeChange">
                  <option :value="10">10 条</option><option :value="20">20 条</option><option :value="50">50 条</option>
                </select>
              </label>
            </div>
          </div>
        </template>

        <!-- 用户管理 -->
        <template v-else-if="view === 'users'">
          <div class="page-header">
            <div><span class="eyebrow">Admin Panel</span><h1>用户管理</h1><p>创建、编辑和禁用系统用户账号</p></div>
            <button class="btn btn-primary" @click="showUserForm = true; resetUserForm()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              创建用户
            </button>
          </div>
          <div class="doc-view">
            <div v-if="showUserForm" class="modal-overlay" @click.self="showUserForm = false">
              <div class="modal-card">
                <h2>{{ editingUser ? '编辑用户' : '创建用户' }}</h2>
                <div class="form-g"><label>用户名</label><input v-model="userForm.username" placeholder="登录用户名" :disabled="!!editingUser" /></div>
                <div class="form-g"><label>密码{{ editingUser ? '（留空不修改）' : '' }}</label><input v-model="userForm.password" type="password" placeholder="密码" /></div>
                <div class="form-g"><label>角色</label><select v-model="userForm.role"><option value="admin">管理员</option><option value="user">游客</option><option value="auditor">审计员</option></select></div>
                <div class="modal-actions">
                  <button class="btn btn-ghost" @click="showUserForm = false">取消</button>
                  <button class="btn btn-primary" @click="saveUser" :disabled="userSaving">{{ userSaving ? '保存中…' : '保存' }}</button>
                </div>
                <div v-if="userFormError" class="login-error">{{ userFormError }}</div>
              </div>
            </div>
            <div class="doc-table">
              <table>
                <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>创建时间</th><th style="width:140px">操作</th></tr></thead>
                <tbody>
                  <tr v-for="u in userList" :key="u.id">
                    <td>{{ u.id }}</td><td>{{ u.username }}</td>
                    <td><span class="tag" :class="roleTag(u.role)">{{ roleLabel(u.role) }}</span></td>
                    <td><span class="tag" :class="u.is_active ? 'ok' : 'err'">{{ u.is_active ? '启用' : '禁用' }}</span></td>
                    <td>{{ u.created_at }}</td>
                    <td>
                      <span v-if="u.id !== 1" class="row-action" @click="editUser(u)">编辑</span>
                      <span v-if="u.id !== currentUser.id && u.id !== 1" class="row-action danger" @click="deleteUser(u)">删除</span>
                    </td>
                  </tr>
                </tbody>
              </table>
              <div v-if="!userList.length" class="empty"><p>暂无用户数据</p></div>
            </div>
          </div>
        </template>

        <!-- 审计日志 -->
        <template v-else-if="view === 'audit'">
          <div class="page-header">
            <div><span class="eyebrow">Security Audit</span><h1>审计日志</h1><p>查看系统用户操作行为记录</p></div>
            <div class="page-header-right">
              <button v-if="isAdmin" class="btn btn-danger-outline" @click="clearAllLogs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                清空全部
              </button>
              <button v-if="isAdmin && selectedLogIds.length" class="btn btn-danger-outline" @click="deleteSelectedLogs">
                删除选中 ({{ selectedLogIds.length }})
              </button>
            </div>
          </div>
          <div class="doc-view">
            <div class="doc-table">
              <table>
                <thead><tr>
                  <th v-if="isAdmin" style="width:40px"><input type="checkbox" class="table-check" :checked="allLogsSelected()" @change="toggleSelectAll" /></th>
                  <th style="width:60px">ID</th><th style="width:100px">用户</th><th>操作详情</th><th style="width:120px">IP</th><th style="width:160px">时间</th>
                  <th v-if="isAdmin" style="width:50px"></th>
                </tr></thead>
                <tbody>
                  <tr v-for="lg in auditLogs" :key="lg.id">
                    <td v-if="isAdmin"><input type="checkbox" class="table-check" :checked="selectedLogIds.includes(lg.id)" @change="toggleLogSelect(lg.id)" /></td>
                    <td>{{ lg.id }}</td><td>{{ lg.username || '-' }}</td>
                    <td class="td-detail"><span class="tag audit-tag audit-tag-inline">{{ auditActionLabel(lg.action) }}</span>{{ lg.detail || '-' }}</td>
                    <td>{{ lg.ip || '-' }}</td><td>{{ lg.created_at }}</td>
                    <td v-if="isAdmin"><span class="row-action danger del-icon" @click="deleteSingleLog(lg.id)" title="删除">✕</span></td>
                  </tr>
                </tbody>
              </table>
              <div v-if="!auditLogs.length" class="empty"><p>暂无审计记录</p></div>
            </div>
            <div class="pagination" v-if="auditTotalPages > 1">
              <span>共 {{ auditTotal }} 条</span>
              <div class="pager">
                <button class="pager-btn" @click="auditGoToPage(auditPage - 1)" :disabled="auditPage <= 1">上一页</button>
                <span class="pager-info">{{ auditPage }} / {{ auditTotalPages }}</span>
                <button class="pager-btn" @click="auditGoToPage(auditPage + 1)" :disabled="auditPage >= auditTotalPages">下一页</button>
              </div>
            </div>
          </div>
        </template>
      </main>
    </div>
  </div>

  <script src="/static/js/vue.global.prod.js"></script>
  <script src="/static/js/marked.min.js"></script>
  <script src="/static/js/purify.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
